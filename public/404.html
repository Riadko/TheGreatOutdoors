<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page introuvable</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #fff7ed;
        --card: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --brand: #ea580c;
        --brand-dark: #c2410c;
        --wa: #10b981;
        --wa-dark: #059669;
        --ring: rgba(234, 88, 12, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Tahoma, Arial, sans-serif;
        color: var(--text);
        background:
          linear-gradient(rgba(17, 24, 39, 0.62), rgba(17, 24, 39, 0.62)),
          url('images/hero-5.webp') center / cover no-repeat;
        display: grid;
        place-items: start center;
      }

      .card {
        width: min(900px, 100%);
        padding: 0px 24px 24px;
        color: #ffffff;
        text-align: center;
      }

      .brand {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 14px;
        flex-wrap: nowrap;
      }

      .brand img {
        width: 180px;
        height: 180px;
        object-fit: contain;
        filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.32));
      }

      .brand strong {
        font-size: clamp(26px, 3.5vw, 44px);
        letter-spacing: -0.02em;
        font-weight: 900;
        line-height: 1.05;
        text-align: left;
      }

      .brand .accent {
        color: #f97316;
      }

      h1 {
        margin: -50px 0 6px;
        text-align: center;
        font-size: clamp(72px, 16vw, 120px);
        line-height: 0.92;
        font-weight: 900;
        text-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      }

      .subtitle {
        margin: 0 auto 14px;
        text-align: center;
        color: #e5e7eb;
        font-size: clamp(16px, 2.5vw, 22px);
        max-width: 720px;
        line-height: 1.5;
      }

      .video-wrap {
        width: min(460px, 100%);
        margin: 0 auto;
        border-radius: 24px;
        overflow: hidden;
      }

      .video-wrap video {
        display: block;
        width: 100%;
        height: auto;
        max-height: 24rem;
        object-fit: cover;
      }

      .actions {
        display: flex;
        justify-content: center;
        margin-top: 12px;
      }

      .btn-home {
        appearance: none;
        border: 0;
        border-radius: 14px;
        padding: 12px 20px;
        background: linear-gradient(135deg, var(--brand), #f59e0b);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 10px 28px rgba(234, 88, 12, 0.32);
        transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      }

      .btn-home:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 34px rgba(234, 88, 12, 0.4);
        background: linear-gradient(135deg, var(--brand-dark), #d97706);
      }

      .btn-home:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 2px;
      }

      .wa-banner {
        margin-top: 12px;
        border: 1px solid #a7f3d0;
        background: rgba(236, 253, 245, 0.95);
        border-radius: 16px;
        padding: 14px;
      }

      .wa-content {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .wa-text {
        display: grid;
        gap: 2px;
      }

      .wa-text strong {
        font-size: 15px;
        color: #111827;
      }

      .wa-text strong .highlight {
        color: #111827;
      }

      .wa-text span {
        color: #065f46;
        font-weight: 700;
        font-size: 14px;
      }

      .wa-link {
        border-radius: 12px;
        background: var(--wa);
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        padding: 10px 14px;
        white-space: nowrap;
        transition: background 0.15s ease;
      }

      .wa-link:hover {
        background: var(--wa-dark);
      }

      @media (max-width: 768px) {
        .card {
          padding: 18px 18px 24px;
        }

        .brand {
          gap: 10px;
        }

        .brand img {
          width: 150px;
          height: 150px;
        }

        .brand strong {
          font-size: clamp(24px, 7vw, 34px);
        }

        h1 {
          margin: -30px 0 10px;
          font-size: clamp(64px, 20vw, 96px);
        }

        .subtitle {
          margin-bottom: 16px;
          font-size: clamp(15px, 4.3vw, 18px);
          line-height: 1.45;
        }

        .video-wrap {
          width: min(420px, 100%);
        }

        .actions {
          margin-top: 14px;
        }

        .wa-banner {
          margin-top: 14px;
          padding: 14px;
        }
      }

      @media (max-width: 520px) {
        .card {
          padding: 14px 12px 20px;
        }

        .brand {
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 4px;
        }

        .brand img {
          width: 124px;
          height: 124px;
        }

        .brand strong {
          text-align: center;
          font-size: clamp(21px, 8vw, 30px);
          line-height: 1.08;
        }

        h1 {
          margin: -6px 0 10px;
          font-size: clamp(62px, 25vw, 86px);
          line-height: 0.88;
        }

        .subtitle {
          margin-bottom: 18px;
          max-width: 34ch;
        }

        .video-wrap {
          border-radius: 18px;
        }

        .btn-home {
          padding: 12px 18px;
        }

        .wa-banner {
          margin-top: 16px;
          border-radius: 14px;
          padding: 12px;
        }

        .wa-content {
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
        }

        .wa-text {
          text-align: center;
          gap: 4px;
        }

        .wa-text strong {
          font-size: 14px;
          line-height: 1.35;
        }

        .wa-text span {
          font-size: 13px;
        }

        .wa-link {
          display: block;
          width: 100%;
          text-align: center;
          padding: 12px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <img src="images/logo-2.webp" alt="The Great Outdoors" />
        <strong>The Great <span class="accent">Outdoors</span></strong>
      </div>

      <h1>404</h1>
      <p class="subtitle">Désolé, nous n'avons pas trouvé la page que vous recherchez.</p>

      <div class="video-wrap" aria-label="Vidéo de présentation">
        <video autoplay loop muted playsinline preload="metadata" controlsList="nodownload noplaybackrate" disablepictureinpicture>
          <source src="images/outputvid.webm" type="video/webm" />
        </video>
      </div>

      <div class="actions">
        <a class="btn-home" href="/">Revenir a l'accueil</a>
      </div>

      <section class="wa-banner" aria-label="WhatsApp Help Banner">
        <div class="wa-content">
          <div class="wa-text">
            <strong><span class="highlight">Des questions ou envie de commander rapidement ?</span></strong>
            <span>Contactez-nous sur WhatsApp</span>
          </div>
          <a class="wa-link" href="https://wa.me/213797350430" target="_blank" rel="noreferrer">Commander via WhatsApp</a>
        </div>
      </section>
    </main>
  </body>
</html>
